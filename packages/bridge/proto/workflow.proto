syntax = "proto3";

package macos.bridge.v1;

option go_package = "github.com/gocanto/mac-os/internal/bridgepb";

service WorkflowBridge {
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc RunWorkflow(RunWorkflowRequest) returns (stream WorkflowEvent);
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc RunLog(RunLogRequest) returns (RunLogResponse);
  rpc GetSettings(GetSettingsRequest) returns (SettingsResponse);
  rpc ValidateSettings(ValidateSettingsRequest) returns (SettingsValidationResponse);
  rpc GetUserPreferences(GetUserPreferencesRequest) returns (UserPreferencesResponse);
  rpc SaveUserPreferences(SaveUserPreferencesRequest) returns (UserPreferencesResponse);
}

message ListWorkflowsRequest {}

message ListWorkflowsResponse {
  repeated Workflow workflows = 1;
}

message Workflow {
  string id = 1;
  string name = 2;
  string description = 3;
  string changes_mac = 4;
  repeated Phase phases = 5;
  Confirmation confirmation = 6;
}

message Phase {
  string id = 1;
  string name = 2;
  bool enabled = 3;
}

message Confirmation {
  string title = 1;
  string message = 2;
  repeated ConfirmationOption options = 3;
}

message ConfirmationOption {
  string id = 1;
  string label = 2;
  string description = 3;
  bool continue = 4;
  bool back = 5;
  repeated Phase phases = 6;
}

message RunWorkflowRequest {
  string workflow_id = 1;
  string confirmation_option_id = 2;
  repeated string enabled_phase_ids = 3;
}

message WorkflowEvent {
  int64 id = 1;
  string run_id = 2;
  int64 seq = 3;
  string type = 4;
  string phase_id = 5;
  string phase_name = 6;
  string status = 7;
  string message = 8;
  string created_at = 9;
}

message ListRunsRequest {
  int64 limit = 1;
}

message ListRunsResponse {
  repeated RunSummary runs = 1;
}

message RunSummary {
  string id = 1;
  string workflow_id = 2;
  string workflow_name = 3;
  string confirmation_option_id = 4;
  string confirmation_option_label = 5;
  string mode = 6;
  string status = 7;
  string started_at = 8;
  string completed_at = 9;
  string error_message = 10;
}

message RunLogRequest {
  string run_id = 1;
}

message RunLogResponse {
  RunSummary run = 1;
  repeated WorkflowEvent events = 2;
}

message GetSettingsRequest {}

message ValidateSettingsRequest {
  RuntimeSettings settings = 1;
}

message SettingsResponse {
  RuntimeSettings settings = 1;
  repeated SettingsCheck checks = 2;
  bool valid = 3;
}

message SettingsValidationResponse {
  RuntimeSettings settings = 1;
  repeated SettingsCheck checks = 2;
  bool valid = 3;
}

message RuntimeSettings {
  string repo_root = 1;
  string apps_config_path = 2;
  string secrets_config_path = 3;
  string generated_apps_path = 4;
  string archive_root = 5;
  string workflow_db_path = 6;
  string op_vault = 7;
  string op_item = 8;
}

message SettingsCheck {
  string key = 1;
  string label = 2;
  string path = 3;
  string status = 4;
  string message = 5;
}

message GetUserPreferencesRequest {}

message SaveUserPreferencesRequest {
  string theme = 1;
}

message UserPreferencesResponse {
  string theme = 1;
  string updated_at = 2;
}
