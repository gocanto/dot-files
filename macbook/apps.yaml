apps:
  - name: 1Password
    bundle_id: com.1password.1password
    install_method: brew
    package: 1password
    config_mode: manual
    onepassword_fields:
      - restore_notes

  - name: Air
    bundle_id: com.jetbrains.air
    install_method: manual
    package: https://www.jetbrains.com/ai/
    config_mode: manual

  - name: Bruno
    bundle_id: com.usebruno.app
    install_method: brew
    package: bruno
    config_mode: auto
    config_paths:
      - source: ~/Library/Preferences/com.usebruno.app.plist
        target: bruno/Preferences/com.usebruno.app.plist

  - name: Caffeine
    bundle_id: net.domzilla.caffeine
