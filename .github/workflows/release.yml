name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Pin checkout to triggering commit
        run: git reset --hard "$GITHUB_SHA"

      - name: Setup workspace
        uses: ./.github/actions/setup-workspace

      - name: Check release tag
        id: release-tag
        shell: bash
        run: |
          git fetch --tags --force

          previous_tag="$(
            git tag --list 'dot-files-*' |
              awk -F '[.-]' '/^dot-files-[0-9]+\.[0-9]+\.[0-9]+$/ { print $3, $4, $5, $0 }' |
              sort -k1,1n -k2,2n -k3,3n |
              tail -n 1 |
              awk '{ print $4 }'
          )"
          tag="dot-files-0.0.1"

          if [[ -n "$previous_tag" ]]; then
            version="${previous_tag#dot-files-}"
            IFS=. read -r major minor patch <<< "$version"
            tag="dot-files-${major}.${minor}.$((patch + 1))"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$previous_tag" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Release tag $tag already exists; skipping release."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        id: release-notes
        if: steps.release-tag.outputs.exists != 'true'
        shell: bash
        run: |
          notes_file="$RUNNER_TEMP/release-notes.md"
          previous_tag="${{ steps.release-tag.outputs.previous_tag }}"

          if [[ -n "$previous_tag" ]]; then
            git log "$previous_tag"..HEAD --pretty='- %s (%h)' > "$notes_file"
          else
            git log --pretty='- %s (%h)' > "$notes_file"
          fi

          if [[ ! -s "$notes_file" ]]; then
            echo "- Release $(git rev-parse --short HEAD)" > "$notes_file"
          fi

          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create published release
        if: steps.release-tag.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: pnpm release:mac:unsigned -- --notes-file "${{ steps.release-notes.outputs.path }}" --repo gocanto/dot-files --tag "${{ steps.release-tag.outputs.tag }}"

      - name: Upload release artifacts
        if: ${{ success() && steps.release-tag.outputs.exists != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: macos-unsigned-release
          path: packages/ui/release/*
          if-no-files-found: error
